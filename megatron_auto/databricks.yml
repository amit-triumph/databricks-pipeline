# This is a Databricks asset bundle definition for megatron_auto.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: megatron_auto
  uuid: 2bbd83f1-3e48-4a4a-96b2-f47e87a6e537

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-3584557707849727.7.azuredatabricks.net
    variables:
      catalog: dev-sample-1
      schema: rnd
  prod:
    mode: production
    workspace:
      host: https://adb-3584557707849727.7.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/amit.k@shyenatechyarns.in to make sure we only have a single copy.
      root_path: /Workspace/Users/amit.k@shyenatechyarns.in/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod-sample-1
      schema: rnd
    permissions:
      - user_name: amit.k@shyenatechyarns.in
        level: CAN_MANAGE
