# A sample job for megatron_auto.

resources:
  jobs:
    megatron-auto_1:
      name: megatron-auto_1

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: get_cust_trn_count
          notebook_task:
            notebook_path: ../src/transformation.ipynb
            source: WORKSPACE

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
